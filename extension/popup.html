<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0b;
      --surface: #111113;
      --surface-2: #1a1a1e;
      --border: #2a2a2e;
      --text: #e4e4e7;
      --text-dim: #71717a;
      --accent: #f97316;
      --accent-glow: rgba(249, 115, 22, 0.15);
      --green: #22c55e;
    }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 360px;
      min-height: 200px;
    }

    .view { display: none; }
    .view.active { display: block; }

    .header {
      padding: 20px 20px 0;
      text-align: center;
    }

    .logo {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .tagline {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .section {
      padding: 16px 20px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .duration-row {
      display: flex;
      gap: 6px;
    }

    .dur-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .dur-btn:hover { border-color: var(--accent); color: var(--text); }
    .dur-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

    .sites-input-row {
      display: flex;
      gap: 8px;
    }

    .site-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      outline: none;
      font-family: inherit;
    }

    .site-input::placeholder { color: var(--text-dim); }
    .site-input:focus { border-color: var(--accent); }

    .add-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 18px;
      width: 40px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .add-btn:hover { border-color: var(--accent); background: var(--accent-glow); }

    .sites-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .site-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .site-tag-remove {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
    }

    .site-tag-remove:hover { color: #ef4444; }

    .hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
    }

    .lockin-btn {
      width: calc(100% - 40px);
      margin: 4px 20px 20px;
      padding: 14px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 1px;
      transition: all 0.15s;
    }

    .lockin-btn:hover { filter: brightness(1.1); }
    .lockin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ---- Active View ---- */
    .active-view {
      text-align: center;
      padding: 24px 20px;
    }

    .timer-big {
      font-size: 52px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      letter-spacing: -2px;
      margin: 16px 0 4px;
    }

    .active-label {
      font-size: 12px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 600;
    }

    .allowed-list {
      margin: 20px 0;
      text-align: left;
    }

    .allowed-list-title {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .allowed-item {
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .allowed-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .no-escape {
      margin-top: 20px;
      font-size: 11px;
      color: var(--text-dim);
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      line-height: 1.5;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--surface-2);
      border-radius: 2px;
      margin-top: 16px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 1s linear;
    }
  </style>
</head>
<body>

  <!-- SETUP VIEW -->
  <div class="view active" id="setupView">
    <div class="header">
      <div class="logo">Lock In</div>
      <div class="tagline">Block everything. No escape. Do the work.</div>
    </div>

    <div class="section">
      <div class="section-label">Duration</div>
      <div class="duration-row">
        <button class="dur-btn" data-min="15">15m</button>
        <button class="dur-btn active" data-min="25">25m</button>
        <button class="dur-btn" data-min="45">45m</button>
        <button class="dur-btn" data-min="60">1h</button>
        <button class="dur-btn" data-min="90">1.5h</button>
        <button class="dur-btn" data-min="120">2h</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Allowed Sites</div>
      <div class="sites-input-row">
        <input type="text" class="site-input" id="siteInput" placeholder="e.g. github.com">
        <button class="add-btn" id="addSiteBtn">+</button>
      </div>
      <div class="hint">Only these sites will work. Everything else is blocked.</div>
      <div class="sites-list" id="sitesList"></div>
    </div>

    <button class="lockin-btn" id="lockinBtn">LOCK IN</button>
  </div>

  <!-- ACTIVE VIEW (no end button) -->
  <div class="view" id="activeView">
    <div class="active-view">
      <div class="active-label">Locked In</div>
      <div class="timer-big" id="timerDisplay">25:00</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>

      <div class="allowed-list">
        <div class="allowed-list-title">Allowed Sites</div>
        <div id="activeAllowedList"></div>
      </div>

      <div class="no-escape">
        No way out. Session ends when the timer hits zero.
        System-level blocking is active across all browsers.
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
